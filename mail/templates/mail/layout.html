{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mail{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" 
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'mail/styles.css' %}">
    <style>
        /* Minimalne style, żeby było widać sekcje */
        #emails-view, #email-view, #compose-view {
            margin-top: 20px;
        }

        #compose-view, #email-view {
            display: none;  /* domyślnie ukryty */
        }

        .email {
            padding: 10px;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        .email:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">

        {% if user.is_authenticated %}
            <h2>{{ request.user.email }}</h2>

            <button class="btn btn-sm btn-outline-primary" id="inbox">Inbox</button>
            <button class="btn btn-sm btn-outline-primary" id="compose">Compose</button>
            <button class="btn btn-sm btn-outline-primary" id="sent">Sent</button>
            <button class="btn btn-sm btn-outline-primary" id="archived">Archived</button>
            <a class="btn btn-sm btn-outline-primary" href="{% url 'logout' %}">Log Out</a>
            <hr>

            <!-- Widok listy maili -->
            <div id="emails-view"></div>

            <!-- Widok pojedynczego maila -->
            <div id="email-view"></div>

            <!-- Widok tworzenia maila -->
            <div id="compose-view">
                <h3>New Email</h3>
                <form id="compose-form">
                    <div class="form-group">
                        From: <input disabled class="form-control" value="{{ request.user.email }}">
                    </div>
                    <div class="form-group">
                        To: <input id="compose-recipients" class="form-control">
                    </div>
                    <div class="form-group">
                        <input class="form-control" id="compose-subject" placeholder="Subject">
                    </div>
                    <textarea class="form-control" id="compose-body" placeholder="Body"></textarea>
                    <input type="submit" class="btn btn-primary mt-2"/>
                </form>
            </div>
        {% endif %}

        <!-- Ten blok body będzie zawsze dostępny -->
        {% block body %}{% endblock %}

    </div>

    {% block script %}
        <script src="{% static 'mail/inbox.js' %}"></script>
    {% endblock %}
</body>
</html>
